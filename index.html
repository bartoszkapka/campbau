<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0d0d0d" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Camp Bau" />
    <title>Camp Bau</title>
    <!-- Preload the Verlag faces actually used in CSS so they fetch in
         parallel with the HTML parse and are ready by the time @font-face
         rules reference them. crossorigin is required even for same-origin
         font preloads to match how the browser fetches @font-face. -->
    <link rel="preload" href="/fonts/verlag-book.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/verlag-bold.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/verlag-black.woff2" as="font" type="font/woff2" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").catch((err) => {
            console.warn("SW registration failed:", err);
          });
        });
      }
    </script>
  </body>
</html>
